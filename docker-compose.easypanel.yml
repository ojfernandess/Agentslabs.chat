# Stack de referência: app (imagem GHCR) + MongoDB com replica set.
# 1) Rode o workflow "Publish Docker image (GHCR / EasyPanel)" no GitHub.
# 2) Imagem publicada pelo workflow GHCR (ajuste a tag se necessário).
#
# No EasyPanel: pode usar "Docker Compose" colando este ficheiro, ou criar Mongo à parte
# e apontar MONGO_URL/MONGO_OPLOG_URL para o cluster (ex.: Atlas com ?replicaSet=).
#
# Sem mapeamento `ports:` no serviço app — o EasyPanel encaminha pelo proxy para a porta
# interna 3000 e evita o aviso "ports might cause conflicts". Ver docs/EASYPANEL.md.

services:
  mongo:
    image: mongodb/mongodb-community-server:${MONGODB_VERSION:-8.0}-ubi8
    restart: on-failure
    environment:
      MONGODB_REPLICA_SET_NAME: ${MONGODB_REPLICA_SET_NAME:-rs0}
      MONGODB_PORT_NUMBER: ${MONGODB_PORT_NUMBER:-27017}
      MONGODB_INITIAL_PRIMARY_HOST: ${MONGODB_INITIAL_PRIMARY_HOST:-mongo}
    entrypoint: |
      bash -c
        "mongod --replSet $$MONGODB_REPLICA_SET_NAME --bind_ip_all &
          sleep 2;
          until mongosh --eval \"db.adminCommand('ping')\"; do
            echo 'Waiting for Mongo...';
            sleep 1;
          done;
          mongosh --eval \"try { rs.status(); } catch (e) { rs.initiate({_id: '$$MONGODB_REPLICA_SET_NAME', members: [{ _id: 0, host: '$$MONGODB_INITIAL_PRIMARY_HOST:$$MONGODB_PORT_NUMBER' }]}); }\";
        wait"
    volumes:
      - mongo_data:/data/db

  app:
    image: ghcr.io/ojfernandess/agentslabs.chat:latest
    restart: on-failure
    depends_on:
      - mongo
    # Não usar `ports:` aqui: o EasyPanel mostra "ports might cause conflicts" e pode colidir
    # com outros serviços no host. Associe o domínio ao serviço e use porta interna **3000**.
    # Para testes diretos no host, descomente:  ports: [ "3001:3000" ]
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      ROOT_URL: ${ROOT_URL:-http://localhost:3000}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/rocketchat?replicaSet=rs0}
      MONGO_OPLOG_URL: ${MONGO_OPLOG_URL:-mongodb://mongo:27017/local?replicaSet=rs0}
      Accounts_AvatarStorePath: /app/uploads
    volumes:
      - app_uploads:/app/uploads

volumes:
  mongo_data:
  app_uploads:
