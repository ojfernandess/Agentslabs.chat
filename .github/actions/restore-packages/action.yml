name: 'Restore Packages Build'
description: 'Downloads and unpacks the packages build artifact'

runs:
  using: 'composite'
  steps:
    - name: Restore packages build
      uses: actions/download-artifact@v8
      with:
        name: packages-build
        path: /tmp

    - name: Unpack packages build
      shell: bash
      run: |
        tar -xzf /tmp/RocketChat-packages-build.tar.gz -C .

    - name: Fix rocketchat-i18n i18n path
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -d packages/i18n/dist/resources ]; then
          echo "::error::packages/i18n/dist/resources is missing (packages build output)."
          exit 1
        fi
        ( cd apps/meteor/packages/rocketchat-i18n && rm -f i18n && ln -sfn ../../../../packages/i18n/dist/resources i18n )
